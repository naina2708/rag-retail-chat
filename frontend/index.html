<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Retail AI Document Chat</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

<header>
<h1>Retail AI Assistant</h1>
<p>Upload documents and ask intelligent questions</p>
</header>

<section class="upload-section">

<input type="file" id="pdfFile">

<button onclick="uploadPDF()" class="upload-btn">
Upload Document
</button>

<p id="uploadStatus"></p>

</section>

<section class="chat-section">

<div class="chat-box" id="chatContainer"></div>

<div class="input-area">

<input 
type="text"
id="questionInput"
placeholder="Ask something about your document..."
/>

<button onclick="askQuestion()" class="send-btn">
Send
</button>

</div>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
